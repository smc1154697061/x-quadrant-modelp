[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    api: API测试
    dao: DAO层测试
    service: 服务层测试
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
